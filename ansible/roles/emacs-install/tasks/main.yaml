---

- name: Install build dependencies for Emacs
  include_tasks: "install-build-dependencies.yaml"
  tags:
    - dependencies

- name: Install vterm module
  include_tasks: vterm.yaml
  vars:
    vterm_repo: https://github.com/akermu/emacs-libvterm.git
    vterm_src_dir: "{{ ansible_env.HOME }}/.cache/emacs-libvterm"
    vterm_build_dir: "{{ vterm_src_dir }}/build"
    vterm_xdg_data_home: >-
      {{ ansible_env.XDG_DATA_HOME
         | default(ansible_env.HOME ~ '/.local/share') }}
    vterm_install_dir: "{{ vterm_xdg_data_home }}/emacs/site-lisp/vterm"
    vterm_use_system_libvterm: false

- name: Select Emacs versions to install
  set_fact:
    emacs_versions_to_install: >-
      {{
        emacs_versions
        if (requested_emacs_version | default('') | length == 0)
        else (emacs_versions | selectattr('version', 'equalto', requested_emacs_version) | list)
      }}

- name: Validate requested Emacs version
  ansible.builtin.assert:
    that:
      - emacs_versions_to_install | length > 0
    fail_msg: >-
      Emacs version '{{ requested_emacs_version }}' is not defined in emacs_versions.
      Available version values: {{ emacs_versions | map(attribute='version') | unique | join(', ') }}
  when: requested_emacs_version | default('') | length > 0

- name: Install Emacs
  include_tasks: "build-emacs.yaml"
  loop: "{{ emacs_versions_to_install }}"
  loop_control:
    label: "{{ item.version }}{{ '-' ~ (item.suffix | default('')) if (item.suffix | default('')) | length > 0 else '' }}"

- name: Prune old daily master builds
  include_tasks: "prune-old-builds.yaml"
  tags:
    - prune
